<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Evidence — City of Lies</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.audio-layout { display: grid; grid-template-columns: 240px 1fr; height: calc(100vh - 53px); }
.audio-sidebar { background: var(--noir-panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; }
.audio-main { display: flex; flex-direction: column; overflow-y: auto; }
.sidebar-title { font-family: var(--font-sans); font-size: 8px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }
.audio-item { padding: 10px 12px; border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
.audio-item:hover { border-color: var(--blue-accent); background: rgba(58,90,140,0.1); }
.audio-item.active { border-color: var(--amber); background: rgba(200,145,42,0.08); }
.audio-item-title { font-family: var(--font-mono); font-size: 10px; color: var(--cream); margin-bottom: 4px; }
.audio-item-sub { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); line-height: 1.5; }

/* Audio player */
.audio-player { background: var(--noir-panel); border-bottom: 1px solid var(--border); padding: 20px 24px; }
.player-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 16px; }
.player-icon { width: 50px; height: 50px; background: var(--blue-deep); border: 1px solid var(--border-bright); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.player-meta { flex: 1; }
.player-file { font-family: var(--font-mono); font-size: 13px; color: var(--amber); margin-bottom: 4px; }
.player-source { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); line-height: 1.6; }
.player-controls { display: flex; align-items: center; gap: 12px; }
.play-btn { background: var(--blue-deep); border: 1px solid var(--blue-accent); color: var(--blue-bright); padding: 8px 20px; cursor: pointer; font-family: var(--font-sans); font-size: 10px; letter-spacing: 2px; transition: all 0.15s; }
.play-btn:hover, .play-btn.playing { background: var(--blue-accent); color: var(--cream); }
.audio-timeline { flex: 1; height: 6px; background: var(--border); cursor: pointer; position: relative; }
.audio-progress { height: 100%; background: var(--blue-accent); }
.audio-time { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); white-space: nowrap; }

/* Waveform visualizer */
.waveform-container { height: 60px; background: var(--noir-dark); border: 1px solid var(--border); margin-top: 12px; position: relative; overflow: hidden; cursor: pointer; }
.waveform-canvas { width: 100%; height: 100%; display: block; }
.waveform-playhead { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--amber); pointer-events: none; transition: left 0.1s; }

/* Spectrogram */
.spectrogram-section { padding: 20px 24px; border-bottom: 1px solid var(--border); }
.spec-title { font-family: var(--font-sans); font-size: 9px; letter-spacing: 3px; color: var(--amber); text-transform: uppercase; margin-bottom: 14px; }
.spectrogram-display { background: #020208; border: 1px solid var(--border); position: relative; overflow: hidden; height: 180px; }
.spec-canvas { width: 100%; height: 100%; display: block; }
.spec-overlay { position: absolute; inset: 0; pointer-events: none; }
.spec-y-labels { position: absolute; left: 0; top: 0; bottom: 0; width: 36px; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; justify-content: space-between; padding: 4px 4px; }
.spec-y-label { font-family: var(--font-mono); font-size: 7px; color: rgba(255,255,255,0.3); text-align: right; }
.spec-anomaly-marker { position: absolute; top: 0; bottom: 0; background: rgba(255,50,50,0.1); border-left: 1px solid rgba(255,50,50,0.5); border-right: 1px solid rgba(255,50,50,0.5); }
.spec-anomaly-label { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); font-family: var(--font-mono); font-size: 7px; color: rgba(255,100,100,0.8); white-space: nowrap; }
.spec-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.spec-info-item { background: var(--noir-dark); border: 1px solid var(--border); padding: 10px; }
.spec-info-label { font-family: var(--font-sans); font-size: 7px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px; }
.spec-info-val { font-family: var(--font-mono); font-size: 10px; color: var(--text); line-height: 1.6; }
.spec-clue-box { background: rgba(200,145,42,0.08); border: 1px solid var(--amber-dim); padding: 12px 14px; margin-top: 10px; }
.spec-clue-label { font-family: var(--font-sans); font-size: 7px; letter-spacing: 2px; color: var(--amber); margin-bottom: 6px; }
.spec-clue-text { font-family: var(--font-mono); font-size: 10px; color: var(--cream-dim); line-height: 1.7; }

/* Transcript */
.transcript-section { padding: 20px 24px; }
.transcript-box { background: var(--noir-dark); border: 1px solid var(--border); padding: 16px; font-family: var(--font-mono); font-size: 11px; color: var(--text); line-height: 2; white-space: pre-line; }
.transcript-timestamp { color: var(--text-muted); font-size: 9px; }
.transcript-anomaly-highlight { background: rgba(200,145,42,0.15); border-bottom: 1px solid var(--amber-dim); }

@media (max-width: 700px) {
  .audio-layout { grid-template-columns: 1fr; }
  .audio-sidebar { max-height: 180px; border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body>
<div id="notification"></div>
<div class="screen-header">
  <div>
    <div class="screen-header-title">Audio Evidence &amp; Spectrogram Analysis</div>
    <div class="screen-header-sub" id="audio-header-sub">Select an audio file</div>
  </div>
  <button class="back-btn" onclick="window.location.href='../index.html'">← BOARD</button>
</div>

<div class="audio-layout">
  <div class="audio-sidebar">
    <div class="sidebar-title">Audio Files</div>
    <div id="audio-list"></div>
    <div style="margin-top:20px">
      <div class="sidebar-title">Spectrograms</div>
      <div id="spec-list"></div>
    </div>
  </div>
  <div class="audio-main">
    <div id="player-container" style="display:none">
      <!-- Player injected here -->
    </div>
    <div id="spec-container" style="display:none">
      <!-- Spectrogram injected here -->
    </div>
    <div id="transcript-container" style="display:none">
      <!-- Transcript injected here -->
    </div>
    <div id="empty-state" style="padding:60px;text-align:center;color:var(--text-dim);font-family:var(--font-mono);font-size:11px">
      Select an audio file or spectrogram to begin analysis.
    </div>
  </div>
</div>

<script src="../js/game.js"></script>
<script>
let currentAudio = null;
let audioProgress = 0;
let audioPlaying = false;
let audioInterval = null;
let specCanvas = null;

function buildSidebar() {
  const c = COL.getCase();
  const al = document.getElementById('audio-list');
  c.audio.forEach(a => {
    const item = document.createElement('div');
    item.className = 'audio-item';
    item.id = 'ai-' + a.id;
    item.innerHTML = `<div class="audio-item-title">${a.file}</div><div class="audio-item-sub">${a.duration}<br>${a.timestamp}</div>`;
    item.onclick = () => loadAudio(a.id);
    al.appendChild(item);
  });
  const sl = document.getElementById('spec-list');
  c.spectrograms.forEach(s => {
    const item = document.createElement('div');
    item.className = 'audio-item';
    item.id = 'si-' + s.id;
    item.innerHTML = `<div class="audio-item-title">${s.label}</div><div class="audio-item-sub">${s.audio_ref}</div>`;
    item.onclick = () => loadSpectrogram(s.id);
    sl.appendChild(item);
  });
}

function loadAudio(id) {
  const c = COL.getCase();
  currentAudio = c.audio.find(a => a.id === id);
  if (!currentAudio) return;
  stopAudio();
  audioProgress = 0;

  document.querySelectorAll('.audio-item').forEach(el => el.classList.remove('active'));
  document.getElementById('ai-' + id).classList.add('active');
  document.getElementById('audio-header-sub').textContent = currentAudio.file;
  document.getElementById('empty-state').style.display = 'none';

  // Build player
  const pc = document.getElementById('player-container');
  pc.style.display = 'block';
  pc.innerHTML = `
    <div class="audio-player">
      <div class="player-top">
        <div class="player-icon">🎙️</div>
        <div class="player-meta">
          <div class="player-file">${currentAudio.file}</div>
          <div class="player-source">${currentAudio.source}<br>Timestamp: ${currentAudio.timestamp} · Duration: ${currentAudio.duration}</div>
        </div>
      </div>
      <div class="player-controls">
        <button class="play-btn" id="play-btn" onclick="toggleAudio()">▶ PLAY</button>
        <div class="audio-timeline" id="audio-timeline" onclick="scrubAudio(event)">
          <div class="audio-progress" id="audio-prog" style="width:0%"></div>
        </div>
        <div class="audio-time" id="audio-time">0:00 / ${currentAudio.duration}</div>
      </div>
      <div class="waveform-container" id="waveform-container">
        <canvas class="waveform-canvas" id="waveform-canvas"></canvas>
        <div class="waveform-playhead" id="waveform-playhead" style="left:0%"></div>
      </div>
    </div>`;

  drawWaveform();

  // Load spectrogram for this audio
  const spec = c.spectrograms.find(s => s.id === currentAudio.spectrogram_id);
  if (spec) loadSpectrogram(spec.id, false);

  // Load transcript
  loadTranscript();

  COL.state.listenedAudio.add(id);
  COL.markEvidence(currentAudio.evidence_ids[0]);
}

function loadSpectrogram(id, fromSidebar = true) {
  const c = COL.getCase();
  const spec = c.spectrograms.find(s => s.id === id);
  if (!spec) return;

  if (fromSidebar) {
    document.querySelectorAll('.audio-item').forEach(el => el.classList.remove('active'));
    document.getElementById('si-' + id).classList.add('active');
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('audio-header-sub').textContent = spec.label + ' — ' + spec.audio_ref;
  }

  const sc = document.getElementById('spec-container');
  sc.style.display = 'block';
  sc.innerHTML = `
    <div class="spectrogram-section">
      <div class="spec-title">${spec.label} — ${spec.audio_ref}</div>
      <div class="spectrogram-display">
        <canvas class="spec-canvas" id="spec-canvas-${id}"></canvas>
        <div class="spec-overlay">
          <div class="spec-y-labels">
            <div class="spec-y-label">8k</div>
            <div class="spec-y-label">4k</div>
            <div class="spec-y-label">2k</div>
            <div class="spec-y-label">1k</div>
            <div class="spec-y-label">500</div>
            <div class="spec-y-label">200</div>
            <div class="spec-y-label">60</div>
          </div>
          <div class="spec-anomaly-marker" style="left:62%;width:15%">
            <span class="spec-anomaly-label">ANOMALY</span>
          </div>
        </div>
      </div>
      <div class="spec-info">
        <div class="spec-info-item">
          <div class="spec-info-label">Visual Description</div>
          <div class="spec-info-val">${spec.visual}</div>
        </div>
        <div class="spec-info-item">
          <div class="spec-info-label">Investigator Notes</div>
          <div class="spec-info-val">${spec.investigator_notes}</div>
        </div>
      </div>
      <div class="spec-clue-box">
        <div class="spec-clue-label">🔍 HIDDEN CLUE — FORENSIC ANALYSIS</div>
        <div class="spec-clue-text">${spec.hidden_clue}</div>
      </div>
      <div style="margin-top:14px;display:flex;gap:8px">
        <button class="btn btn-amber" style="flex:1;font-size:10px" onclick="markSpecEvidence('${id}')">📌 ADD TO CASE FILE</button>
      </div>
    </div>`;

  // Draw spectrogram
  setTimeout(() => drawSpectrogram(id, spec), 50);
}

function loadTranscript() {
  if (!currentAudio) return;
  const tc = document.getElementById('transcript-container');
  tc.style.display = 'block';
  tc.innerHTML = `
    <div class="transcript-section">
      <div style="font-family:var(--font-sans);font-size:9px;letter-spacing:3px;color:var(--amber);text-transform:uppercase;margin-bottom:12px">Transcript</div>
      <div class="transcript-box">${currentAudio.transcript}</div>
      <div style="margin-top:12px">
        <div style="font-family:var(--font-sans);font-size:8px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px">Audio Anomaly</div>
        <div class="anomaly-box" style="background:rgba(140,42,42,0.15);border:1px solid var(--red-dark);padding:10px 12px">
          <div style="font-family:var(--font-sans);font-size:8px;letter-spacing:2px;color:var(--red);margin-bottom:6px">⚠ ANOMALY</div>
          <div style="font-family:var(--font-mono);font-size:11px;color:var(--cream-dim);line-height:1.7">${currentAudio.anomaly}</div>
        </div>
      </div>
    </div>`;
}

// ── WAVEFORM DRAWING ─────────────────────────────────────────
function drawWaveform() {
  const canvas = document.getElementById('waveform-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#020208';
  ctx.fillRect(0, 0, w, h);
  const mid = h / 2;
  const seed = currentAudio ? currentAudio.id.charCodeAt(0) : 42;
  for (let x = 0; x < w; x++) {
    const t = x / w;
    const amp = (Math.sin(t * 80 + seed) * 0.4 + Math.sin(t * 33 + seed * 2) * 0.3 + Math.random() * 0.3) * mid * 0.7;
    const silence = currentAudio && currentAudio.id === 'audio_01' && t > 0.78 && t < 0.87;
    const finalAmp = silence ? amp * 0.05 : amp;
    ctx.strokeStyle = silence ? 'rgba(255,80,80,0.3)' : 'rgba(58,90,140,0.8)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, mid - finalAmp);
    ctx.lineTo(x, mid + finalAmp);
    ctx.stroke();
  }
  // Highlight anomaly zone
  if (currentAudio && currentAudio.id === 'audio_01') {
    ctx.fillStyle = 'rgba(255,50,50,0.08)';
    ctx.fillRect(w * 0.78, 0, w * 0.09, h);
  }
}

// ── SPECTROGRAM DRAWING ──────────────────────────────────────
function drawSpectrogram(id, spec) {
  const canvas = document.getElementById('spec-canvas-' + id);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = 180;
  const w = canvas.width, h = canvas.height;
  const seed = id.charCodeAt(id.length - 1);

  // Draw frequency bands
  const colors = [
    [0, 20, 'rgba(0,20,60,0.9)'],
    [20, 50, 'rgba(0,40,100,0.85)'],
    [50, 100, 'rgba(10,60,140,0.8)'],
    [100, 200, 'rgba(20,80,180,0.75)'],
    [200, 500, 'rgba(30,100,200,0.8)'],
    [500, 1000, 'rgba(50,140,220,0.7)'],
    [1000, 2000, 'rgba(80,180,240,0.6)'],
    [2000, 4000, 'rgba(120,200,255,0.4)'],
    [4000, 8000, 'rgba(160,220,255,0.2)'],
  ];

  for (let x = 36; x < w; x++) {
    const t = (x - 36) / (w - 36);
    colors.forEach(([, , color], ci) => {
      const yFrac = 1 - (ci + 1) / colors.length;
      const bandH = h / colors.length;
      const y = yFrac * h;
      const intensity = Math.sin(t * (40 + ci * 8) + seed + ci) * 0.4 +
                       Math.sin(t * (20 + ci * 3) + seed * 2) * 0.3 +
                       (Math.random() * 0.3);
      const alpha = Math.max(0, Math.min(1, 0.3 + intensity * 0.7));
      ctx.fillStyle = color.replace(/[\d.]+\)$/, `${alpha})`);
      ctx.fillRect(x, y, 1, bandH);
    });

    // Silence window for voicemail
    if (id === 'spec_a' && t > 0.62 && t < 0.73) {
      ctx.fillStyle = 'rgba(0,0,5,0.9)';
      ctx.fillRect(x, 0, 1, h * 0.85);
      // LF pulse
      if (t > 0.63 && t < 0.67) {
        ctx.fillStyle = 'rgba(100,100,255,0.6)';
        ctx.fillRect(x, h * 0.9, 1, h * 0.1);
      }
    }

    // Carrier bleed for spec_b
    if (id === 'spec_b' && t > 0.64 && t < 0.66) {
      ctx.fillStyle = 'rgba(255,200,50,0.7)';
      ctx.fillRect(x, h * 0.15, 1, h * 0.05);
    }

    // Notification spike for spec_c
    if (id === 'spec_c' && t > 0.72 && t < 0.73) {
      ctx.fillStyle = 'rgba(255,100,100,0.9)';
      ctx.fillRect(x, h * 0.2, 1, h * 0.08);
    }

    // Stun spike for spec_d
    if (id === 'spec_d' && t > 0.60 && t < 0.61) {
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fillRect(x, 0, 2, h);
    }
  }

  // Frequency axis labels on left
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, 36, h);
}

// ── PLAYBACK ─────────────────────────────────────────────────
function toggleAudio() {
  if (audioPlaying) stopAudio(); else startAudio();
}
function startAudio() {
  if (!currentAudio) return;
  audioPlaying = true;
  const btn = document.getElementById('play-btn');
  if (btn) { btn.textContent = '⏸ PAUSE'; btn.classList.add('playing'); }
  const dur = parseFloat(currentAudio.duration) * 60 || 103;
  audioInterval = setInterval(() => {
    audioProgress = Math.min(1, audioProgress + 0.01 / dur);
    updateAudioDisplay();
    if (audioProgress >= 1) stopAudio();
  }, 100);
}
function stopAudio() {
  audioPlaying = false;
  clearInterval(audioInterval);
  const btn = document.getElementById('play-btn');
  if (btn) { btn.textContent = '▶ PLAY'; btn.classList.remove('playing'); }
}
function updateAudioDisplay() {
  const prog = document.getElementById('audio-prog');
  const playhead = document.getElementById('waveform-playhead');
  if (prog) prog.style.width = (audioProgress * 100) + '%';
  if (playhead) playhead.style.left = (audioProgress * 100) + '%';
}
function scrubAudio(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  audioProgress = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  updateAudioDisplay();
}
function markSpecEvidence(specId) {
  const c = COL.getCase();
  const spec = c.spectrograms.find(s => s.id === specId);
  if (spec) {
    COL.addNote(`[SPECTROGRAM] ${spec.label}: ${spec.hidden_clue.substring(0, 100)}...`);
    COL.notify('Spectrogram analysis added to case file.');
  }
}

document.addEventListener('DOMContentLoaded', () => {
  buildSidebar();
  const target = sessionStorage.getItem('col_target');
  if (target) loadAudio(target);
});
</script>
</body>
</html>
