<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documents — City of Lies</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.docs-layout { display: grid; grid-template-columns: 240px 1fr; height: calc(100vh - 53px); }
.docs-sidebar { background: var(--noir-panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; }
.docs-main { overflow-y: auto; background: var(--noir-dark); padding: 24px; }
.sidebar-title { font-family: var(--font-sans); font-size: 8px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }
.doc-item { padding: 12px; border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
.doc-item:hover { border-color: var(--blue-accent); background: rgba(58,90,140,0.1); }
.doc-item.active { border-color: var(--amber); }
.doc-item-title { font-family: var(--font-type); font-size: 11px; color: var(--cream); margin-bottom: 4px; line-height: 1.4; }
.doc-item-sub { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); }
.doc-item .tag { margin-top: 6px; }

/* Document paper */
.document-paper {
  max-width: 760px;
  margin: 0 auto;
  background: #f4f0e0;
  box-shadow: 0 4px 30px rgba(0,0,0,0.6);
  position: relative;
}
.doc-paper-header {
  background: #e8e0c8;
  border-bottom: 2px solid #b8a870;
  padding: 20px 30px 16px;
}
.doc-paper-type { font-family: var(--font-sans); font-size: 8px; letter-spacing: 4px; color: #5a4820; text-transform: uppercase; margin-bottom: 6px; }
.doc-paper-title { font-family: var(--font-type); font-size: 1.3rem; color: #1a1008; margin-bottom: 8px; }
.doc-paper-meta { font-family: var(--font-mono); font-size: 9px; color: #5a4820; line-height: 1.8; }
.doc-paper-body { padding: 28px 30px; font-family: var(--font-mono); font-size: 11px; color: #1a1008; line-height: 2; white-space: pre-line; position: relative; }
.doc-paper-body::before { content: ''; position: absolute; left: 56px; top: 0; bottom: 0; width: 1px; background: rgba(200,150,100,0.3); }
.doc-highlight { background: rgba(255,230,100,0.4); border-bottom: 1px solid rgba(200,150,50,0.5); }
.doc-redacted { background: #1a1008; color: #1a1008; user-select: none; }
.doc-stamp-area { padding: 0 30px 20px; display: flex; justify-content: flex-end; }
.doc-actions { padding: 16px 24px; background: var(--noir-panel); border: 1px solid var(--border); margin-top: 16px; max-width: 760px; margin-left: auto; margin-right: auto; display: flex; gap: 10px; align-items: center; }
.contradiction-badge { background: rgba(140,42,42,0.15); border: 1px solid var(--red-dark); padding: 10px 14px; margin: 0 30px 20px; }
.contradiction-label { font-family: var(--font-sans); font-size: 7px; letter-spacing: 2px; color: var(--red); margin-bottom: 6px; }
.contradiction-text { font-family: var(--font-mono); font-size: 10px; color: var(--cream-dim); line-height: 1.7; }

/* Evidence cross-reference */
.xref-section { max-width: 760px; margin: 20px auto 0; }
.xref-title { font-family: var(--font-sans); font-size: 9px; letter-spacing: 3px; color: var(--amber); text-transform: uppercase; margin-bottom: 12px; }
.xref-item { background: var(--noir-panel); border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 8px; }
.xref-item-title { font-family: var(--font-sans); font-size: 10px; letter-spacing: 1px; color: var(--cream); margin-bottom: 4px; }
.xref-item-text { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); line-height: 1.7; }

@media (max-width: 700px) {
  .docs-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .docs-sidebar { max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
  .doc-paper-body { padding: 16px; }
  .doc-paper-header { padding: 14px 16px; }
}
</style>
</head>
<body>
<div id="notification"></div>
<div class="screen-header">
  <div>
    <div class="screen-header-title">Document Archive</div>
    <div class="screen-header-sub" id="doc-header-sub">Select a document</div>
  </div>
  <button class="back-btn" onclick="window.location.href='../index.html'">← BOARD</button>
</div>

<div class="docs-layout">
  <div class="docs-sidebar">
    <div class="sidebar-title">Documents</div>
    <div id="doc-list"></div>
    <div style="margin-top:20px">
      <div class="sidebar-title">Evidence Contradictions</div>
      <div id="contra-list"></div>
    </div>
  </div>
  <div class="docs-main" id="docs-main">
    <div style="text-align:center;padding:60px;color:var(--text-dim);font-family:var(--font-mono);font-size:11px">
      Select a document from the list to read it.
    </div>
  </div>
</div>

<script src="../js/game.js"></script>
<script>
function buildSidebar() {
  const c = COL.getCase();
  const dl = document.getElementById('doc-list');
  c.documents.forEach(d => {
    const item = document.createElement('div');
    item.className = 'doc-item';
    item.id = 'di-' + d.id;
    item.innerHTML = `
      <div class="doc-item-title">${d.title}</div>
      <div class="doc-item-sub">${d.type}<br>${d.date}</div>
      <span class="tag ${d.classification === 'CRITICAL' ? 'tag-red' : d.classification === 'SENSITIVE' ? 'tag-amber' : 'tag-blue'}">${d.classification}</span>`;
    item.onclick = () => loadDocument(d.id);
    dl.appendChild(item);
  });

  const cl = document.getElementById('contra-list');
  c.contradictions.forEach(cont => {
    const item = document.createElement('div');
    item.className = 'doc-item';
    item.innerHTML = `
      <div class="doc-item-title" style="font-size:10px">${cont.title}</div>
      <div class="doc-item-sub">${cont.type}</div>
      <span class="tag ${cont.severity === 'CRITICAL' ? 'tag-red' : cont.severity === 'HIGH' ? 'tag-amber' : 'tag-blue'}">${cont.severity}</span>`;
    item.onclick = () => loadContradiction(cont.id);
    cl.appendChild(item);
  });
}

function loadDocument(id) {
  const c = COL.getCase();
  const doc = c.documents.find(d => d.id === id);
  if (!doc) return;

  document.querySelectorAll('.doc-item').forEach(el => el.classList.remove('active'));
  document.getElementById('di-' + id).classList.add('active');
  document.getElementById('doc-header-sub').textContent = doc.title;

  // Find related contradictions
  const relatedContras = c.contradictions.filter(cont =>
    cont.evidence_a === doc.evidence_ids[0] || cont.evidence_b === doc.evidence_ids[0]
  );

  const main = document.getElementById('docs-main');
  main.innerHTML = `
    <div class="document-paper">
      <div class="doc-paper-header">
        <div class="doc-paper-type">${doc.type}</div>
        <div class="doc-paper-title">${doc.title}</div>
        <div class="doc-paper-meta">
          Author: ${doc.author}<br>
          Date: ${doc.date}<br>
          Classification: <span style="color:${doc.classification === 'CRITICAL' ? '#8c2a2a' : doc.classification === 'SENSITIVE' ? '#7a5500' : '#1a3a6c'}">${doc.classification}</span>
        </div>
      </div>
      <div class="doc-paper-body">${formatDocContent(doc.content)}</div>
      ${doc.classification === 'CRITICAL' ? '<div class="doc-stamp-area"><div class="stamp stamp-red">CRITICAL EVIDENCE</div></div>' : ''}
    </div>
    ${relatedContras.length ? `
      <div class="xref-section">
        <div class="xref-title">⚠ Evidence Cross-Reference — Contradictions</div>
        ${relatedContras.map(cont => `
          <div class="xref-item">
            <div class="xref-item-title">${cont.title} <span class="tag tag-${cont.severity === 'CRITICAL' ? 'red' : 'amber'}" style="margin-left:8px">${cont.severity}</span></div>
            <div class="xref-item-text">${cont.description}</div>
          </div>`).join('')}
      </div>` : ''}
    <div class="doc-actions">
      <button class="btn btn-amber" style="font-size:10px" onclick="markDocEvidence('${id}')">📌 ADD TO CASE FILE</button>
      <span style="font-family:var(--font-mono);font-size:9px;color:var(--text-dim)">Mark as key evidence for your theory</span>
    </div>`;

  COL.state.readDocuments.add(id);
  COL.markEvidence(doc.evidence_ids[0]);
}

function formatDocContent(content) {
  return content
    .replace(/\[REDACTED[^\]]*\]/g, '<span class="doc-redacted">████████████████</span>')
    .replace(/\[SECTION CORRUPTED[^\]]*\]/g, '<span style="color:#8c2a2a;font-style:italic">[SECTION CORRUPTED — DATA UNRECOVERABLE]</span>')
    .replace(/\[PARTIAL DECRYPT[^\]]*\]/g, '<span style="color:#7a5500;font-style:italic">[PARTIAL DECRYPT — 67% RECOVERED]</span>');
}

function loadContradiction(id) {
  const c = COL.getCase();
  const cont = c.contradictions.find(x => x.id === id);
  if (!cont) return;

  document.getElementById('doc-header-sub').textContent = 'Contradiction: ' + cont.title;
  const main = document.getElementById('docs-main');
  main.innerHTML = `
    <div style="max-width:760px;margin:0 auto">
      <div class="xref-section" style="margin-top:0">
        <div class="xref-title">${cont.type} — ${cont.severity} SEVERITY</div>
        <div style="background:var(--noir-panel);border:1px solid ${cont.severity === 'CRITICAL' ? 'var(--red-dark)' : 'var(--border-bright)'};padding:20px;margin-bottom:16px">
          <div style="font-family:var(--font-sans);font-size:14px;letter-spacing:2px;color:var(--amber-bright);margin-bottom:12px">${cont.title}</div>
          <div style="font-family:var(--font-mono);font-size:11px;color:var(--text);line-height:1.9">${cont.description}</div>
          <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
            <span class="tag tag-blue">Evidence A: ${cont.evidence_a}</span>
            <span class="tag tag-blue">Evidence B: ${cont.evidence_b}</span>
          </div>
        </div>
        ${c.contradictions.map(x => `
          <div class="xref-item" style="cursor:pointer;${x.id === id ? 'border-color:var(--amber)' : ''}" onclick="loadContradiction('${x.id}')">
            <div class="xref-item-title">${x.title} <span class="tag tag-${x.severity === 'CRITICAL' ? 'red' : x.severity === 'HIGH' ? 'amber' : 'blue'}" style="margin-left:8px">${x.severity}</span></div>
            <div class="xref-item-text" style="font-size:9px">${x.type}</div>
          </div>`).join('')}
      </div>
      <div class="doc-actions">
        <button class="btn btn-amber" style="font-size:10px" onclick="addContraNote('${id}')">📌 ADD TO CASE FILE</button>
      </div>
    </div>`;
}

function markDocEvidence(id) {
  const c = COL.getCase();
  const doc = c.documents.find(d => d.id === id);
  if (doc) {
    COL.addNote(`[DOCUMENT] Key evidence flagged: ${doc.title}`);
    COL.notify('Document added to case file.');
  }
}

function addContraNote(id) {
  const c = COL.getCase();
  const cont = c.contradictions.find(x => x.id === id);
  if (cont) {
    COL.addNote(`[CONTRADICTION] ${cont.title}: ${cont.description.substring(0,100)}...`);
    COL.notify('Contradiction noted in case file.');
  }
}

document.addEventListener('DOMContentLoaded', () => {
  buildSidebar();
  const target = sessionStorage.getItem('col_target');
  if (target) loadDocument(target);
});
</script>
</body>
</html>
